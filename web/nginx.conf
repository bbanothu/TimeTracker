server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static support/privacy pages for App Store reviewers (no JS required)
  location = /support {
    try_files /support.html =404;
  }

  location = /privacy {
    try_files /privacy-policy.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
